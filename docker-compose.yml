services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-core-api
    command: >
      sh -c "pnpm exec prisma generate &&
      pnpm exec prisma db push --skip-generate &&
      pnpm run seed &&
      pnpm run start:dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      LOG_LEVEL: debug
      STRICT_HEALTH_CHECKS: 'false'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aura_core?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: us-east-1
      S3_BUCKET: product-images
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: rustfsadmin
      S3_FORCE_PATH_STYLE: 'true'
      S3_PUBLIC_BASE_URL: http://localhost:9100/product-images
      PRODUCT_MEDIA_MAX_BYTES: '5242880'
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: aura-core-postgres
    environment:
      POSTGRES_DB: aura_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aura_core']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aura-core-redis
    ports:
      - '56379:6379'
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: aura-core-rustfs
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_ADDRESS: ':9000'
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_CONSOLE_ADDRESS: ':9001'
      RUSTFS_REGION: us-east-1
    ports:
      - '9100:9000'
      - '9101:9001'
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs

volumes:
  api_node_modules:
  postgres_data:
  redis_data:
  rustfs_data:
  rustfs_logs:
